name: Bug Report
description: Report a bug or issue with StickyNotes
title: '[Bug]: '
labels: ['bug', 'claude-fix']
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Our AI assistant Claude will automatically analyze this issue and may create a fix PR.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: What happened instead?
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows 11
        - Windows 10
        - macOS Sonoma
        - macOS Ventura
        - macOS (other)
        - Ubuntu/Debian
        - Other Linux
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: StickyNotes Version
      description: Check Settings > About or run `stickynotes --version`
      placeholder: 'e.g., 2.0.2'
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error Logs (if any)
      description: Paste any error messages or console output
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Add screenshots if they help explain the issue

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to make sure this isn't a duplicate
          required: true
