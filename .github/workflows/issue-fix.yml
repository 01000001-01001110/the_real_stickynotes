name: Claude Code Action

on:
  # Respond to @claude mentions in issues and PRs
  issue_comment:
    types: [created]

  # Auto-review new PRs
  pull_request:
    types: [opened, synchronize]

  # Auto-fix issues with specific labels
  issues:
    types: [labeled]

jobs:
  claude:
    # Run on @claude mentions, PRs, or issues labeled 'claude-fix'
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'issues' && github.event.label.name == 'claude-fix')

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Custom prompt for issue fixing
          direct_prompt: |
            ${{ github.event_name == 'issues' && format('
            Please analyze and fix this issue:

            Issue #{0}: {1}

            {2}

            Make minimal, focused changes. Create a PR with the fix.
            ', github.event.issue.number, github.event.issue.title, github.event.issue.body) || '' }}
