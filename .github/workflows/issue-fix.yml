name: Auto-fix Issues with Claude

on:
  issues:
    types: [opened, labeled]

jobs:
  analyze-and-fix:
    # Only run on issues labeled 'claude-fix' or new issues with 'bug' label
    if: |
      github.event.action == 'labeled' && github.event.label.name == 'claude-fix' ||
      github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'bug')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Create fix branch
        id: branch
        run: |
          BRANCH_NAME="fix/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH_NAME"
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Run Claude Code to fix issue
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Create prompt from issue
          cat > /tmp/issue-prompt.txt << 'ISSUE_EOF'
          GitHub Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

          ${{ github.event.issue.body }}

          ---
          Please analyze this issue and fix it. After fixing:
          1. Make minimal, focused changes
          2. Test that the fix works if possible
          3. Do not add unnecessary features or refactoring
          ISSUE_EOF

          # Run Claude Code with the issue context
          claude -p "$(cat /tmp/issue-prompt.txt)" --yes --max-tokens 50000 || true

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: address issue #${{ github.event.issue.number }}

          Automated fix for: ${{ github.event.issue.title }}

          Closes #${{ github.event.issue.number }}

          Co-Authored-By: Claude <noreply@anthropic.com>"
          git push origin ${{ steps.branch.outputs.branch }}

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "fix: address issue #${{ github.event.issue.number }} - ${{ github.event.issue.title }}" \
            --body "## Summary

          This PR was automatically generated by Claude Code to address issue #${{ github.event.issue.number }}.

          **Original Issue:** ${{ github.event.issue.title }}

          ## Changes Made

          Claude analyzed the issue and made the following changes. Please review carefully before merging.

          ## Test Plan

          - [ ] Verify the fix addresses the reported issue
          - [ ] Run tests locally
          - [ ] Manual testing if applicable

          ---
          Closes #${{ github.event.issue.number }}

          *Automated by Claude Code*" \
            --head "${{ steps.branch.outputs.branch }}" \
            --base main

      - name: Comment on issue (no changes)
        if: steps.changes.outputs.has_changes == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "Claude Code analyzed this issue but was unable to make automated changes. This may require manual investigation.

          **Possible reasons:**
          - The issue description needs more details
          - The fix requires architectural decisions
          - The issue is not a code problem

          A maintainer will look into this."

      - name: Comment on issue (PR created)
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "Claude Code has analyzed this issue and created a pull request with a proposed fix. Please review the PR and provide feedback."
