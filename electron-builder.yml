appId: com.stickynotes.app
productName: The Real StickyNotes
copyright: Copyright © 2025-2026 Alan Newingham

extraMetadata:
  main: electron/main.js

directories:
  output: dist
  buildResources: build

files:
  - electron/**/*
  - src/**/*
  - shared/**/*
  - cli/**/*
  - assets/**/*

# Native dependencies - unpack .node files for native modules
asar: true
asarUnpack:
  - '**/*.node'
  - '**/node_modules/better-sqlite3/**/*'
  - '**/node_modules/fsevents/**/*'
  - 'assets/icons/**/*'
  - 'cli/**/*'
  - 'electron/cli/**/*'

# Windows Configuration
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: assets/icons/icons/win/icon.ico

nsis:
  artifactName: '${productName}-${version}-setup.${ext}'
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: The Real StickyNotes
  uninstallDisplayName: '${productName}'
  runAfterFinish: false
  include: build/installer.nsh

# Portable gets distinct name
portable:
  artifactName: '${productName}-${version}-portable.${ext}'

# File Associations
fileAssociations:
  - ext: stickynote
    name: StickyNotes Document
    description: StickyNotes document file
    role: Editor
    mimeType: application/x-stickynote

# macOS Configuration
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: assets/icons/icons/mac/icon.icns
  category: public.app-category.productivity
  artifactName: '${productName}-${version}-mac-${arch}.${ext}'
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  sign: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Linux Configuration
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64
  icon: assets/icons/icons/png
  category: Utility
  artifactName: '${productName}-${version}-linux-${arch}.${ext}'
  synopsis: A feature-rich sticky notes application
  description: |
    The Real StickyNotes is a powerful desktop sticky notes application with
    cloud sync support and CLI integration.

deb:
  depends:
    - gconf2
    - gconf-service
    - libnotify4
    - libappindicator1
    - libxtst6
    - libnss3

appImage:
  artifactName: '${productName}-${version}.${ext}'

# Auto-update configuration
publish:
  provider: github
  releaseType: release
  owner: 01000001-01001110
  repo: the_real_stickynotes
